<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Prediction System</title>
</head>
<body>
    <form method="POST" action="/get_stock">
        <label>Enter Stock Symbol</label>
        <input type="text" name="symbol" placeholder="Enter symbol(AAPL,TSLA)">
        <button type="submit">Get Data</button>
    </form>
    {% if error %}
        <p style="color: red; margin-top: 10px;" >{{error}}</p>
    {% endif%}
</body>
</html>
